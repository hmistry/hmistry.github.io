  --primary-dim:  #dbeafe;

  /* Shadows */
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);

  /* Typography */
  --font-ui:      -apple-system, "Segoe UI", system-ui, sans-serif;
  --font-mono:    "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  --font-size-base: 14px;

  /* Radius */
  --radius:       8px;
  --radius-sm:    5px;
}

  --bg:           #0d1117;
  --surface:      #161b22;
  --surface-alt:  #1c2128;

  --text:         #e6edf3;
  --text-muted:   #8b949e;
  --text-faint:   #484f58;

  --border:       #30363d;

<script defer>
let md;
let dropzone, fileInput, content, topBtn, theme;

/* -----------------------------
   INIT
----------------------------- */
window.addEventListener("DOMContentLoaded", () => {

  // Init libraries
  md = window.markdownit({
    html: false,
    linkify: true,
    typographer: true
  });

  // Cache DOM
  dropzone = document.getElementById("dropzone");
  fileInput = document.getElementById("fileInput");
  content = document.getElementById("content");
  topBtn = document.getElementById("topBtn");
  theme = document.getElementById("hljs-theme");

  // Auto-render when file is selected via input
  fileInput.addEventListener("change", () => loadFile());

  // Drag & drop
  dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
  });

  dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
  });

  dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (!file) return;
    loadFile(file); // validation happens inside loadFile
  });

  // Restore dark mode
  if (localStorage.getItem("dark") === "true") {
    document.body.classList.add("dark");
    theme.href = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css";
    document.getElementById("darkBtn").textContent = "☽ Dark";
  }

  // Scroll handler
  window.addEventListener("scroll", () => {
  if (!topBtn) return;

  topBtn.style.display = window.scrollY > 300 ? "block" : "none";  });
});

/* -----------------------------
   Render Markdown
----------------------------- */
function renderMarkdown(raw) {
  let html = md.render(raw);
  html = DOMPurify.sanitize(html);

  content.innerHTML = html;

  setHeadingIDs();      // 1. assign IDs (no anchor links yet)
  generateTOC();        // 2. build TOC from clean text + IDs
  makeCollapsible();    // 3. wrap sections and add toggle behaviour
  addAnchorLinks();     // 4. inject 🔗 links into headings
  addCopyButtons();

  if (window.hljs) {
    hljs.highlightAll();
  }
}

/* -----------------------------
   Anchors
----------------------------- */
function setHeadingIDs() {
  document.querySelectorAll("#content h1, #content h2, #content h3").forEach(h => {
    h.id = h.innerText.trim().replace(/\s+/g, '-');
  });
}

function addAnchorLinks() {
  document.querySelectorAll("#content h1, #content h2, #content h3").forEach(h => {
    const a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = " 🔗";
    a.style.textDecoration = "none";
    h.appendChild(a);
  });
}

/* -----------------------------
   TOC
----------------------------- */
function generateTOC() {
  const headers = Array.from(document.querySelectorAll("#content h1, #content h2, #content h3"));
  if (!headers.length) return;

  const hasExplicitTOC = headers.some(h =>
    /^table of contents$/i.test(h.innerText.trim())
  );
  if (hasExplicitTOC) return;

  // Build shared list items HTML with data-level for indentation
  let itemsHTML = '';
  headers.forEach(h => {
    const level = parseInt(h.tagName[1]);
    const label = h.innerText.trim();
    itemsHTML += `<li data-level="${level}"><a href="#${h.id}">${label}</a></li>`;
  });

  // --- Sidebar TOC (screen) ---
  const sidebar = document.getElementById("toc-sidebar");
  sidebar.innerHTML = `
    <div class="toc-controls">
      <span onclick="collapseAll()">collapse all</span>
      <span class="toc-divider">|</span>
      <span onclick="expandAll()">expand all</span>
    </div>
    <strong>Contents</strong>
    <ul>${itemsHTML}</ul>
  `;
  sidebar.style.display = "block";

  // --- Inline TOC (print only, injected into content) ---
  const inlineTOC = document.createElement("div");
  inlineTOC.className = "toc-inline";
  inlineTOC.style.display = "none"; // hidden on screen, shown via print CSS
  inlineTOC.innerHTML = `<strong>Contents</strong><ul>${itemsHTML}</ul>`;
  content.prepend(inlineTOC);

  // Active link highlighting on scroll
  setupTOCHighlight(headers);
}

function setupTOCHighlight(headers) {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const link = document.querySelector(`#toc-sidebar a[href="#${id}"]`);
      if (!link) return;
      if (entry.isIntersecting) {
        document.querySelectorAll("#toc-sidebar a.active").forEach(a => a.classList.remove("active"));
        link.classList.add("active");
      }
    });
  }, { rootMargin: "0px 0px -70% 0px", threshold: 0 });

  headers.forEach(h => observer.observe(h));
}

/* -----------------------------
   Collapsible headings
----------------------------- */
function makeCollapsible() {
  // Process h1s at the top level, then recurse into their content for h2s, then h3s
  wrapLevel(content, 1);
}

function wrapLevel(container, level) {
  if (level > 3) return;

  const tag = "H" + level;
  // Work on a live snapshot of direct children
  const children = Array.from(container.childNodes);

  let i = 0;
  while (i < children.length) {
    const node = children[i];

    if (node.nodeType === Node.ELEMENT_NODE && node.tagName === tag) {
      // Collect all following siblings until the next same-or-higher heading
      const sectionNodes = [];
      let j = i + 1;
      while (j < children.length) {
        const sib = children[j];
        if (
          sib.nodeType === Node.ELEMENT_NODE &&
          /^H[1-3]$/.test(sib.tagName) &&
          parseInt(sib.tagName[1]) <= level
        ) break;
        sectionNodes.push(sib);
        j++;
      }

      if (sectionNodes.length > 0) {
        // Add toggle arrow
        const toggle = document.createElement("span");
        toggle.className = "toggle";
        toggle.textContent = "▾";
        node.prepend(toggle);

        // Wrap section content
        const sectionContent = document.createElement("div");
        sectionContent.className = "section-content";
        sectionContent.dataset.level = level;
        sectionNodes.forEach(n => sectionContent.appendChild(n));
        node.after(sectionContent);

        // Click to collapse/expand
        node.addEventListener("click", e => {
          if (e.target.tagName === "A") return;
          const isCollapsed = sectionContent.classList.toggle("collapsed");
          toggle.classList.toggle("collapsed", isCollapsed);
        });

        // Update snapshot: the sectionNodes are now replaced by sectionContent
        children.splice(i + 1, sectionNodes.length, sectionContent);

        // Recurse into this section to process the next level down
        wrapLevel(sectionContent, level + 1);
      }
    }
    i++;
  }
}


function addCopyButtons() {
  document.querySelectorAll("pre").forEach(pre => {
    const btn = document.createElement("button");
    btn.textContent = "Copy";
    btn.className = "copy-btn";

    btn.onclick = () => {
      const code = pre.querySelector("code")?.innerText || pre.innerText;
      navigator.clipboard.writeText(code);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    };

    pre.appendChild(btn);
  });
}

/* -----------------------------
   File type data (from hljs SUPPORTED_LANGUAGES.md)
   ext -> hljs language alias. Only core-bundle languages
   (the ~40 shipped in highlight.min.js) are listed so
   the fence tag actually works without extra imports.
----------------------------- */
const EXT_TO_LANG = {
  // Web
  js: 'javascript', jsx: 'javascript', mjs: 'javascript',
  ts: 'typescript', tsx: 'typescript', mts: 'typescript',
  css: 'css', scss: 'scss', less: 'less',
  html: 'html', htm: 'html', xml: 'xml', svg: 'xml',
  json: 'json', jsonc: 'json',
  // Systems
  c: 'c', h: 'c',
  cpp: 'cpp', cc: 'cpp', cxx: 'cpp', hpp: 'cpp', hxx: 'cpp',
  cs: 'csharp',
  java: 'java', jsp: 'java',
  rs: 'rust',
  go: 'go',
  swift: 'swift',
  kt: 'kotlin', kts: 'kotlin',
  // Scripting
  py: 'python', gyp: 'python',
  rb: 'ruby', gemspec: 'ruby', thor: 'ruby',
  pl: 'perl', pm: 'perl',
  php: 'php',
  lua: 'lua',
  r: 'r',
  // Shell
  sh: 'bash', bash: 'bash', zsh: 'bash',
  ps1: 'powershell',
  // Data / config
  yml: 'yaml', yaml: 'yaml',
  toml: 'ini', ini: 'ini', cfg: 'ini', conf: 'ini',
  sql: 'sql',
  graphql: 'graphql', gql: 'graphql',
  proto: 'proto',
  // Infra / build
  dockerfile: 'dockerfile',
  tf: 'terraform', hcl: 'terraform',
  gradle: 'gradle',
  mk: 'makefile', mak: 'makefile',
  // Functional
  hs: 'haskell',
  ml: 'ocaml',
  ex: 'elixir', exs: 'elixir',
  erl: 'erlang',
  clj: 'clojure', cljs: 'clojure',
  scala: 'scala',
  dart: 'dart',
  // Markup / doc
  md: 'markdown', markdown: 'markdown',
  tex: 'latex',
  rst: 'plaintext',
  txt: 'plaintext',
  // Other common
  vim: 'vim',
  diff: 'diff', patch: 'diff',
  bat: 'dos', cmd: 'dos',
};

// All extensions we'll accept (md + code files)
const ACCEPTED_EXTS = new Set(Object.keys(EXT_TO_LANG));
// Also accept files with no extension (e.g. Makefile, Dockerfile)
const ACCEPTED_NOEXT_NAMES = new Set([
  'makefile', 'dockerfile', 'gemfile', 'rakefile',
  'procfile', 'vagrantfile', 'brewfile',
]);

function getFileExt(name) {
  const dot = name.lastIndexOf('.');
  return dot > 0 ? name.slice(dot + 1).toLowerCase() : '';
}

function isMarkdownFile(ext) {
  return ext === 'md' || ext === 'markdown';
}

function validateFile(file) {
  const name = file.name;
  const ext = getFileExt(name);
  const baseLower = name.toLowerCase();

  if (ext) {
    if (!ACCEPTED_EXTS.has(ext)) {
      return { ok: false, reason: `".${ext}" files are not supported.\nAccepted: text, markdown, and source code files.` };
    }
  } else {
    // No extension — check known extensionless names
    if (!ACCEPTED_NOEXT_NAMES.has(baseLower)) {
      return { ok: false, reason: `"${name}" doesn't appear to be a text or code file.` };
    }
  }
  return { ok: true };
}

function isNonAscii(text) {
  // Allow printable ASCII + common whitespace (tab, newline, CR)
  // Reject if >2% of first 8KB is non-ASCII — catches binary/UTF-16/images
  const sample = text.slice(0, 8192);
  let nonAscii = 0;
  for (let i = 0; i < sample.length; i++) {
    const code = sample.charCodeAt(i);
    if ((code < 32 && code !== 9 && code !== 10 && code !== 13) || code > 126) {
      nonAscii++;
    }
  }
  return (nonAscii / sample.length) > 0.02;
}

function wrapCodeFile(filename, text) {
  const ext = getFileExt(filename);
  const baseLower = filename.toLowerCase();

  // Pick language hint for the fence
  let lang = EXT_TO_LANG[ext] || '';
  // Extensionless overrides
  if (!ext) {
    if (baseLower === 'makefile' || baseLower === 'rakefile') lang = 'makefile';
    else if (baseLower === 'dockerfile') lang = 'dockerfile';
    else if (baseLower === 'gemfile' || baseLower === 'brewfile') lang = 'ruby';
    else if (baseLower === 'vagrantfile') lang = 'ruby';
    else if (baseLower === 'procfile') lang = 'plaintext';
  }

  // Escape any backtick fences in the source so they don't break the block
  const safe = text.replace(/^`{3,}/gm, m => m.replace(/`/g, '‛'));

  return `# ${filename}\n\n\`\`\`${lang}\n${safe}\n\`\`\`\n`;
}

/* -----------------------------
   File handling
----------------------------- */
function loadFile(file) {
  if (!file) file = fileInput.files[0];
  if (!file) return;

  const validation = validateFile(file);
  if (!validation.ok) {
    alert(validation.reason);
    return;
  }

  const ext = getFileExt(file.name);
  const reader = new FileReader();

  reader.onload = e => {
    let text = e.target.result;

    // Reject binary/non-text content
    if (isNonAscii(text)) {
      alert(`"${file.name}" appears to be a binary file and cannot be displayed.`);
      return;
    }

    // Wrap code files in a markdown template; pass markdown straight through
    if (!isMarkdownFile(ext)) {
      text = wrapCodeFile(file.name, text);
    }

    renderMarkdown(text);
    dropzone.style.display = "none";
  };

  reader.onerror = () => alert("Failed to read file.");
  reader.readAsText(file);
}

function openFile() {
  fileInput.value = ""; // reset so same file can be re-selected
  fileInput.click();
}

/* -----------------------------
   Dark mode
----------------------------- */
function toggleDark() {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("dark", isDark);
  const theme = document.getElementById("hljs-theme");
  theme.href = isDark
    ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css";
  document.getElementById("darkBtn").textContent = isDark ? "☽ Dark" : "☀ Light";
}

/* -----------------------------
   Collapse / Expand all
----------------------------- */
function collapseAll() {
  document.querySelectorAll("#content .section-content").forEach(sec => {
    sec.classList.add("collapsed");
  });
  document.querySelectorAll("#content .toggle").forEach(t => {
    t.classList.add("collapsed");
  });
}

function expandAll() {
  document.querySelectorAll("#content .section-content").forEach(sec => {
    sec.classList.remove("collapsed");
  });
  document.querySelectorAll("#content .toggle").forEach(t => {
    t.classList.remove("collapsed");
  });
}


function scrollToTop() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
</head>

<body>
<div class="container">

<div class="toolbar">
  <h1>Markdown Viewer v1.0</h1>
  <div class="toolbar-actions">
    <button onclick="openFile()">Open file</button>
    <button onclick="toggleDark()" id="darkBtn">☀ Light</button>
  </div>
</div>
<!--more-->
<div id="dropzone" class="dropzone">
  <p><strong>Drop a Markdown or code file here</strong></p>
  <p class="muted">or click to browse</p>
  <input type="file" id="fileInput" accept="*" style="display:none">
  <button class="primary" onclick="openFile()">Choose File</button>
</div>

<div class="main-layout">
  <nav id="toc-sidebar"></nav>
  <div id="content-wrapper">
    <div id="content" class="markdown-body"></div>
  </div>
</div>

</div>

<button id="topBtn" onclick="scrollToTop()">↑ Top</button>

</body>
</html>
